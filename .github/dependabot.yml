version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: daily
      time: '06:00'
      timezone: 'Europe/Berlin'
    rebase-strategy: disabled
    ignore:
      # Need to wait until every plugin support eslint 9
      #
      # It also dropped support for .eslintrc file in favor of flat config
      # Which means that we might need to completely rewrite/restructure our config
      #
      # ref: https://eslint.org/docs/latest/use/configure/migration-guide
      #
      - dependency-name: eslint
        versions:
          - '>= 9'
      # Newer version get stuck when running with supertest in CircleCI
      - dependency-name: fetch-mock
        versions:
          - '> 9.11.0'
    groups:
      babel:
        patterns:
          - '@babel/*'
          - 'babel-*'
          - 'browserslist'
      eslint:
        patterns:
          - '@eslint-*'
          - '@eslint/*'
          - 'eslint-*'
          - 'eslint'
      jest:
        patterns:
          - '@jest/'
          - 'jest-*'
          - 'jest'
          - '@types/jest'
      laboperator-gmbh:
        patterns:
          - '@laboperator-gmbh/*'
